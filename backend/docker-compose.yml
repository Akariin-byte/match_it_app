services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: matchit-postgres
    environment:
      POSTGRES_USER: matchit
      POSTGRES_PASSWORD: matchit
      POSTGRES_DB: matchit
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchit -d matchit"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
